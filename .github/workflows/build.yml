# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: test & package build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    # Ensure npm 11.10. or later for min-release-age support
    - run: npm install -g npm@latest

    - name: Install dependencies
      run: npm ci

    - name: Test (packages/function)
      run: npm run test -w packages/functions
    - name: Build (packages/function)
      run: npm run build:package -w packages/functions

    - name: Test (packages/react)
      run: npm run test -w packages/react
    - name: Build (packages/react)
      run: npm run build:package -w packages/react
